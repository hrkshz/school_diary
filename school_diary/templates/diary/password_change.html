{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}パスワード変更{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">🔒 パスワード変更</h3>
                </div>
                <div class="card-body">
                    <div class="alert alert-info">
                        <strong>初回ログイン時のパスワード変更</strong>
                        <p class="mb-0 mt-2">管理者から送信されたメールに記載されている仮パスワードを入力し、新しいパスワードを設定してください。</p>
                    </div>

                    {% crispy form %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
