<table class="table table-striped">
    <thead>
        <tr>
            {% for column in columns %}
            <th>{{ column }}</th>
            {% endfor %}
        </tr>
    </thead>
    <tbody>
        {% for row in data %}
        <tr>
            {% for column in columns %}
            <td>{{ row|get_item:column }}</td>
            {% endfor %}
        </tr>
        {% endfor %}
    </tbody>
</table>
