name: Deploy to Production

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'terraform/**'

  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: school-diary-production-django
  APP_DIR: /opt/app
  PARAMETER_PREFIX: /school-diary/production

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: compose/production/django/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to EC2 via SSM
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail

          COMMANDS_JSON=$(jq -nc \
            --arg aws_region "${AWS_REGION}" \
            --arg ecr_registry "${ECR_REGISTRY}" \
            --arg ecr_repository "${ECR_REPOSITORY}" \
            --arg image_tag "${IMAGE_TAG}" \
            --arg app_dir "${APP_DIR}" \
            --arg github_repository "${{ github.repository }}" \
            --arg parameter_prefix "${PARAMETER_PREFIX}" \
            '[
              "set -Eeuo pipefail",
              "install -d " + $app_dir + "/bin " + $app_dir + "/.envs/.production " + $app_dir + "/.release",
              "curl -fsSL https://raw.githubusercontent.com/" + $github_repository + "/" + $image_tag + "/scripts/bootstrap/sync-app-files.sh -o " + $app_dir + "/bin/sync-app-files.sh",
              "chmod +x " + $app_dir + "/bin/sync-app-files.sh",
              "export AWS_REGION=" + $aws_region,
              "export ECR_REGISTRY=" + $ecr_registry,
              "export ECR_REPOSITORY=" + $ecr_repository,
              "export IMAGE_TAG=" + $image_tag,
              "export APP_DIR=" + $app_dir,
              "export GITHUB_REPOSITORY=" + $github_repository,
              "export PARAMETER_PREFIX=" + $parameter_prefix,
              "export HEALTH_RETRIES=18",
              "export HEALTH_SLEEP_SECONDS=10",
              $app_dir + "/bin/sync-app-files.sh " + $image_tag,
              $app_dir + "/bin/render-env-from-ssm.sh",
              "cd " + $app_dir + " && " + $app_dir + "/bin/ssm-deploy.sh"
            ]')

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 1800 \
            --parameters "commands=${COMMANDS_JSON}" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          print_invocation_logs() {
            local command_id="$1"
            local stdout_content
            local stderr_content

            stdout_content=$(aws ssm get-command-invocation \
              --command-id "$command_id" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "StandardOutputContent" \
              --output text 2>/dev/null || true)

            stderr_content=$(aws ssm get-command-invocation \
              --command-id "$command_id" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "StandardErrorContent" \
              --output text 2>/dev/null || true)

            echo "----- SSM Standard Output -----"
            if [ -n "${stdout_content}" ] && [ "${stdout_content}" != "None" ]; then
              printf '%s\n' "${stdout_content}"
            else
              echo "(empty)"
            fi

            echo "----- SSM Standard Error -----"
            if [ -n "${stderr_content}" ] && [ "${stderr_content}" != "None" ]; then
              printf '%s\n' "${stderr_content}"
            else
              echo "(empty)"
            fi
          }

          # コマンド完了を待機（最大30分）
          for i in $(seq 1 180); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" \
              --output text 2>/dev/null || echo "InProgress")

            echo "Attempt $i: Status = $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "Deploy completed successfully"
              print_invocation_logs "$COMMAND_ID"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "ExecutionTimedOut" ] || [ "$STATUS" = "DeliveryTimedOut" ] || [ "$STATUS" = "Undeliverable" ] || [ "$STATUS" = "Terminated" ]; then
              echo "Deploy failed with status: $STATUS"
              print_invocation_logs "$COMMAND_ID"
              exit 1
            fi

            sleep 10
          done

          echo "Deploy timed out"
          print_invocation_logs "$COMMAND_ID"
          exit 1

      - name: Verify deployment
        run: |
          sleep 15
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names "school-diary-production-alb" \
            --query "LoadBalancers[0].DNSName" \
            --output text 2>/dev/null || echo "")

          if [ -z "$ALB_DNS" ]; then
            echo "Warning: Could not get ALB DNS"
            exit 0
          fi

          echo "ALB DNS: $ALB_DNS"
          HEALTH_URL="http://${ALB_DNS}/diary/health/"
          echo "Checking: $HEALTH_URL"

          LAST_STATUS="000"
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
            LAST_STATUS="$STATUS"
            echo "Attempt $i: HTTP $STATUS"

            if [ "$STATUS" = "200" ]; then
              echo "Deployment verified successfully"
              exit 0
            fi
            sleep 10
          done

          echo "Health check failed after all retries (last status: $LAST_STATUS)"
          exit 1
