name: Deploy to Production

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'terraform/**'

  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: school-diary-production-django

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: compose/production/django/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to EC2 via SSM
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 600 \
            --parameters commands='[
              "set -e",
              "cd /opt/app",
              "CURRENT_IMAGE=$(docker ps --format \"{{.Image}}\" --filter name=app-django 2>/dev/null || echo none)",
              "echo \"Current image: $CURRENT_IMAGE\"",
              "aws ecr get-login-password --region ap-northeast-1 | docker login --username AWS --password-stdin '"$ECR_REGISTRY"'",
              "export ECR_REGISTRY='"$ECR_REGISTRY"'",
              "export ECR_REPOSITORY='"$ECR_REPOSITORY"'",
              "export IMAGE_TAG='"$IMAGE_TAG"'",
              "docker compose -f docker-compose.production.yml pull django",
              "docker compose -f docker-compose.production.yml run --rm django python manage.py migrate --noinput",
              "docker compose -f docker-compose.production.yml up -d django",
              "sleep 10",
              "if docker compose -f docker-compose.production.yml ps django | grep -q healthy; then echo \"Deploy successful\"; else echo \"Health check failed, rolling back\"; export IMAGE_TAG=latest; docker compose -f docker-compose.production.yml up -d django; exit 1; fi",
              "docker image prune -f"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # コマンド完了を待機（最大10分）
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" \
              --output text 2>/dev/null || echo "InProgress")

            echo "Attempt $i: Status = $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "Deploy completed successfully"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Deploy failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi

            sleep 10
          done

          echo "Deploy timed out"
          exit 1

      - name: Verify deployment
        run: |
          sleep 15
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names "school-diary-production-alb" \
            --query "LoadBalancers[0].DNSName" \
            --output text 2>/dev/null || echo "")

          if [ -z "$ALB_DNS" ]; then
            echo "Warning: Could not get ALB DNS"
            exit 0
          fi

          HEALTH_URL="http://${ALB_DNS}/diary/health/"
          echo "Checking: $HEALTH_URL"

          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
            echo "Attempt $i: HTTP $STATUS"

            if [ "$STATUS" = "200" ]; then
              echo "Deployment verified successfully"
              exit 0
            fi
            sleep 10
          done

          echo "Health check failed after all retries"
          exit 1
