name: Deploy to Production

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'terraform/**'

  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: school-diary-production-django
  APP_DIR: /opt/app
  PARAMETER_PREFIX: /school-diary/production

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: compose/production/django/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to EC2 via SSM
        id: ssm-deploy
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          DEPLOY_RUN_ID: ${{ github.run_id }}
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          export AWS_PAGER=""

          COMMANDS_JSON=$(jq -nc \
            --arg aws_region "${AWS_REGION}" \
            --arg ecr_registry "${ECR_REGISTRY}" \
            --arg ecr_repository "${ECR_REPOSITORY}" \
            --arg image_tag "${IMAGE_TAG}" \
            --arg app_dir "${APP_DIR}" \
            --arg github_repository "${{ github.repository }}" \
            --arg parameter_prefix "${PARAMETER_PREFIX}" \
            --arg deploy_run_id "${DEPLOY_RUN_ID}" \
            --arg deploy_sha "${DEPLOY_SHA}" \
            '[
              "set -eu",
              "install -d " + $app_dir + "/bin " + $app_dir + "/.envs/.production " + $app_dir + "/.release",
              "curl -fsSL https://raw.githubusercontent.com/" + $github_repository + "/" + $image_tag + "/scripts/bootstrap/sync-app-files.sh -o " + $app_dir + "/bin/sync-app-files.sh",
              "chmod +x " + $app_dir + "/bin/sync-app-files.sh",
              "export AWS_REGION=" + $aws_region,
              "export ECR_REGISTRY=" + $ecr_registry,
              "export ECR_REPOSITORY=" + $ecr_repository,
              "export IMAGE_TAG=" + $image_tag,
              "export APP_DIR=" + $app_dir,
              "export GITHUB_REPOSITORY=" + $github_repository,
              "export PARAMETER_PREFIX=" + $parameter_prefix,
              "export DEPLOY_RUN_ID=" + $deploy_run_id,
              "export DEPLOY_SHA=" + $deploy_sha,
              "export HEALTH_RETRIES=18",
              "export HEALTH_SLEEP_SECONDS=10",
              $app_dir + "/bin/sync-app-files.sh " + $image_tag,
              $app_dir + "/bin/render-env-from-ssm.sh",
              "cd " + $app_dir + " && " + $app_dir + "/bin/ssm-deploy.sh"
            ]')

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 1800 \
            --parameters "commands=${COMMANDS_JSON}" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"
          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"
          {
            echo "### Deploy Trace"
            echo ""
            echo "- GitHub Run ID: ${DEPLOY_RUN_ID}"
            echo "- Deploy SHA: ${DEPLOY_SHA}"
            echo "- SSM Command ID: ${COMMAND_ID}"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Waiting for SSM command to finish..."
          if ! aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"; then
            echo "SSM waiter reported failure or timeout for command: $COMMAND_ID"
            exit 1
          fi

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "Status" \
            --output text)

          echo "Final SSM status: $STATUS"

          if [ "$STATUS" != "Success" ]; then
            echo "Deploy failed with status: $STATUS"
            exit 1
          fi

          echo "Deploy completed successfully"

      - name: Fetch SSM invocation logs
        if: always() && steps.ssm-deploy.outputs.command_id != ''
        env:
          COMMAND_ID: ${{ steps.ssm-deploy.outputs.command_id }}
        run: |
          set -euo pipefail
          export AWS_PAGER=""

          echo "Fetching logs for command: ${COMMAND_ID}"
          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "{Status:Status,StatusDetails:StatusDetails,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}" \
            --output json

      - name: Verify deployment
        if: success()
        env:
          DEPLOY_RUN_ID: ${{ github.run_id }}
          DEPLOY_SHA: ${{ github.sha }}
          COMMAND_ID: ${{ steps.ssm-deploy.outputs.command_id }}
        run: |
          set -euo pipefail
          export AWS_PAGER=""

          sleep 15
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names "school-diary-production-alb" \
            --query "LoadBalancers[0].DNSName" \
            --output text 2>/dev/null || echo "")

          if [ -z "$ALB_DNS" ]; then
            echo "Warning: Could not get ALB DNS"
            exit 0
          fi

          echo "ALB DNS: $ALB_DNS"
          HEALTH_URL="http://${ALB_DNS}/diary/health/"
          echo "GitHub Run ID: ${DEPLOY_RUN_ID}"
          echo "Deploy SHA: ${DEPLOY_SHA}"
          echo "SSM Command ID: ${COMMAND_ID}"
          echo "Checking: $HEALTH_URL"

          LAST_STATUS="000"
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
            LAST_STATUS="$STATUS"
            echo "Attempt $i: HTTP $STATUS"

            if [ "$STATUS" = "200" ]; then
              echo "Deployment verified successfully"
              exit 0
            fi
            sleep 10
          done

          echo "Health check failed after all retries (last status: $LAST_STATUS)"
          exit 1
