volumes:
  school_diary_local_postgres_data: {}
  school_diary_local_postgres_data_backups: {}
  school_diary_local_redis_data: {}

services:
  django: &django
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
    image: school_diary_local_django
    container_name: school_diary_local_django   
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mailpit:
        condition: service_started
    volumes:
      - /app/.venv
      - .:/app:z
    env_file:
      - ./.envs/.local/.django
      - ./.envs/.local/.postgres
    ports:
      - '8000:8000'
        #command: /start
    command: /start

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: school_diary_production_postgres
    container_name: school_diary_local_postgres
    volumes:
      - school_diary_local_postgres_data:/var/lib/postgresql/data
      - school_diary_local_postgres_data_backups:/backups
    env_file:
      - ./.envs/.local/.postgres
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: docker.io/axllent/mailpit:latest
    container_name: school_diary_local_mailpit
    ports:
      - "8025:8025"

  redis:
    image: docker.io/redis:6
    container_name: school_diary_local_redis
    volumes:
      - school_diary_local_redis_data:/data

  celeryworker:
    <<: *django
    image: school_diary_local_celeryworker
    container_name: school_diary_local_celeryworker
    depends_on:
      - redis
      - postgres
      - mailpit
    ports: []
    command: /start-celeryworker

  celerybeat:
    <<: *django
    image: school_diary_local_celerybeat
    container_name: school_diary_local_celerybeat
    depends_on:
      - redis
      - postgres
      - mailpit
    ports: []
    command: /start-celerybeat

  flower:
    <<: *django
    image: school_diary_local_flower
    container_name: school_diary_local_flower
    ports:
      - '5555:5555'
    command: /start-flower
