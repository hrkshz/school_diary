# =================================================================
# GitLab CI/CD設定ファイル（ECR版）
# =================================================================

# 基本イメージ（Python 3.12）
image: python:3.12-slim

# グローバル変数
variables:
  # Docker設定
  DOCKER_DRIVER: overlay2

  # AWS設定
  AWS_DEFAULT_REGION: ap-northeast-1

  # ECR設定（自動計算）
  ECR_REGISTRY: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com
  ECR_REPOSITORY: school-diary-production-django

  # テスト用
  DJANGO_SETTINGS_MODULE: "config.settings.test"
  DATABASE_URL: "sqlite:///test.db"

# ステージ定義（実行順序）
stages:
  - test # テスト実行
  - build # Dockerイメージビルド
  - deploy # EC2デプロイ

# 依存関係キャッシュ（ビルド高速化）
cache:
  key:
    files:
      - uv.lock # uv.lockが変更されたらキャッシュ無効化
  paths:
    - .venv/
    - .cache/pip/
    - .cache/uv/  # uv用キャッシュ（依存関係解決の高速化）
  policy: pull-push

# 全ジョブ共通の事前処理
before_script:
  - python -V
  - pip install uv
  - apt-get update && apt-get install -y build-essential libpq-dev

#━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Stage 1: Test（並列実行）
#━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Linting
lint:
  stage: test
  script:
    - uv sync --frozen --all-extras --dev
    - uv run ruff check .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Type Checking
type-check:
  stage: test
  script:
    - uv sync --frozen --all-extras --dev
    - uv run mypy school_diary --disable-error-code import-untyped
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  allow_failure: true # mypyエラーは警告扱い

# Unit Test（主要機能のみ: 03-features.mdベース）
unit-test:
  stage: test
  services:
    - postgres:16-alpine # テスト用PostgreSQL
  variables:
    POSTGRES_DB: test_db
    POSTGRES_USER: test_user
    POSTGRES_PASSWORD: test_password
    DATABASE_URL: "postgres://test_user:test_password@postgres:5432/test_db"
  script:
    - apt-get update && apt-get install -y libpq-dev
    - uv sync --frozen --all-extras --dev
    - uv run python manage.py migrate --noinput
    # 主要機能テストのみ実行（Critical Path）
    - uv run pytest school_diary/diary/tests/features/ --cov=school_diary --cov-report=term --cov-report=xml -v
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    paths:
      - htmlcov/
      - coverage.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

#━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Stage 2: Build（ECRにpush）
#━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

build-image:
  stage: build
  image: docker:24 # Docker CLI
  services:
    - name: docker:24-dind
      alias: docker
      command: ["--tls=false"]
  variables:
    # Docker in Docker設定（TLS無効化）
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    # AWS CLIインストール
    - apk add --no-cache aws-cli python3 py3-pip

    # デバッグ: 環境変数確認
    - echo "AWS_ACCESS_KEY_ID exists = $(test -n "$AWS_ACCESS_KEY_ID" && echo YES || echo NO)"
    - echo "AWS_SECRET_ACCESS_KEY exists = $(test -n "$AWS_SECRET_ACCESS_KEY" && echo YES || echo NO)"
    - echo "AWS_DEFAULT_REGION = $AWS_DEFAULT_REGION"
    - echo "ECR_REGISTRY = $ECR_REGISTRY"

    # ECRログイン
    - |
      aws ecr get-login-password --region $AWS_DEFAULT_REGION | \
        docker login --username AWS --password-stdin $ECR_REGISTRY

  script:
    # Dockerイメージビルド
    - |
      docker build \
        -f compose/production/django/Dockerfile \
        -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
        -t $ECR_REGISTRY/$ECR_REPOSITORY:$CI_COMMIT_SHORT_SHA \
        .

    # ECRにpush
    - docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
    - docker push $ECR_REGISTRY/$ECR_REPOSITORY:$CI_COMMIT_SHORT_SHA

  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH # mainブランチのみ
  tags:
    - docker

#━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Stage 3: Deploy（EC2にデプロイ）
#━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

deploy-production:
  stage: deploy
  image: alpine:latest
  before_script:
    # SSH clientインストール
    - apk add --no-cache openssh-client bash

    # SSH設定
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$EC2_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts

  script:
    # docker-compose.ymlをEC2に転送（イメージタグ更新のため）
    - echo "=== ファイル転送 ==="
    - scp docker-compose.production.yml $EC2_USER@$EC2_HOST:/opt/app/

    # EC2にSSH接続してデプロイ
    - |
      ssh $EC2_USER@$EC2_HOST bash -s << ENDSSH
        set -e  # エラー時に停止
        cd /opt/app

        echo "=== 環境変数設定 ==="
        export ECR_REGISTRY=$ECR_REGISTRY
        export ECR_REPOSITORY=$ECR_REPOSITORY
        export IMAGE_TAG=latest

        echo "=== ECRログイン ==="
        aws ecr get-login-password --region ap-northeast-1 | \
          docker login --username AWS --password-stdin \$ECR_REGISTRY

        echo "=== Dockerイメージpull ==="
        docker compose -f docker-compose.production.yml pull

        echo "=== コンテナ再起動 ==="
        docker compose -f docker-compose.production.yml up -d --force-recreate

        echo "=== マイグレーション ==="
        docker compose -f docker-compose.production.yml exec -T django \
          python manage.py migrate --noinput

        echo "=== 静的ファイル収集 ==="
        docker compose -f docker-compose.production.yml exec -T django \
          python manage.py collectstatic --noinput

        echo "=== ヘルスチェック ==="
        docker compose -f docker-compose.production.yml exec -T django \
          python manage.py check --deploy

        echo "=== 古いDockerイメージ削除 ==="
        docker image prune -af --filter "until=24h" || true

        echo "=== Build Cache削除 ==="
        docker builder prune -af --filter "until=24h" || true

        echo "=== ディスク状況確認 ==="
        df -h / || true
        docker system df || true

        echo "=== デプロイ完了！ ==="
      ENDSSH

  environment:
    name: production
    url: http://$EC2_HOST

  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual # 手動実行（安全のため）
